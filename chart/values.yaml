imagePullSecrets: []
registry: ""
cors:
  allowedOrigins:
    - http://localhost:8080
    - http://localhost:5173
    - http://localhost:5174

frontend:
  image: sylvanfranklin/sentience-frontend
  imagePullPolicy: Always
  replicas: 1
  resources:
    requests: 
      memory: "32Mi"
    limits:
      memory: "64Mi"

backend:
  image: sylvanfranklin/sentience-backend
  imagePullPolicy: Always
  replicas: 1
  logLevel: debug
  resources:
    requests: 
      memory: "32Mi"
    limits:
      memory: "64Mi"

